[project]
id = "be415123-cd10-49b5-a19b-32854a170e32"
name = "xiaonuan"
description = "小暖 - AI 情感伴侣微信公众号"

[service.xiaonuan]
name = "xiaonuan"
root = "./"
startCommand = "python run.py"
healthcheckPath = "/health"

[service.xiaonuan.build]
builder = "NIXPACKS"

[service.xiaonuan.environment]
OPENAI_API_KEY = { source = "secret", description = "DeepSeek/OpenAI API Key" }
OPENAI_BASE_URL = { value = "https://api.deepseek.com/v1", description = "API 基础 URL" }
OPENAI_MODEL = { value = "deepseek-chat", description = "AI 模型名称" }
WECHAT_TOKEN = { source = "secret", description = "微信公众号 Token (sc_95b794770efd)" }
WECHAT_APP_ID = { source = "secret", description = "微信公众号 AppID (wx5fc928e116a1e67e)" }
WECHAT_APP_SECRET = { source = "secret", description = "微信公众号 AppSecret" }
COMPANION_NAME = { value = "小暖", description = "伴侣名字" }
MAX_TOKENS = { value = "800", description = "AI 最大输出 Token" }
TEMPERATURE = { value = "0.85", description = "AI 温度参数" }
HOST = { value = "0.0.0.0", description = "监听地址" }
PORT = { value = "8000", description = "监听端口" }

[service.xiaonuan.networking]
public = true
port = 8000

[service.xiaonuan.deploy]
autoDeploy = true
restartPolicy = "ALWAYS"
